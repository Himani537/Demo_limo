<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIMO | Sign Up</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#009688,#00c853);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:1050px;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    box-shadow:0 15px 40px rgba(0,0,0,.2);
}

.left{
    width:45%;
    background:linear-gradient(135deg,#009688,#00695c);
    color:#fff;
    padding:60px 40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.left h1{
    font-size:50px;
    margin-bottom:10px;
}

.left h2{
    margin-top:40px;
    font-size:32px;
}

.left p{
    margin-top:15px;
    line-height:1.8;
    font-size:17px;
}

.right{
    width:55%;
    padding:40px;
}

.right h2{
    text-align:center;
    color:#333;
    margin-bottom:30px;
}

.input-box{
    position:relative;
    margin-bottom:18px;
}

.input-box i{
    position:absolute;
    top:16px;
    left:15px;
    color:#009688;
}

.input-box input,
.input-box select{
    width:100%;
    padding:15px 15px 15px 45px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:15px;
    outline:none;
}

.input-box input:focus,
.input-box select:focus{
    border-color:#009688;
}

.row{
    display:flex;
    gap:15px;
}

.row .input-box{
    width:50%;
}

.checkbox{
    margin:15px 0;
    font-size:14px;
}

.checkbox input{
    margin-right:8px;
}

button{
    width:100%;
    padding:15px;
    background:#009688;
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#00796b;
}

.login{
    text-align:center;
    margin-top:20px;
}

.login a{
    color:#009688;
    text-decoration:none;
    font-weight:bold;
}

@media(max-width:768px){

.container{
    flex-direction:column;
}

.left,
.right{
    width:100%;
}

.left{
    text-align:center;
    padding:40px 25px;
}

.row{
    flex-direction:column;
}

.row .input-box{
    width:100%;
}

}

</style>

</head>

<body>

<div class="container">

<div class="left">

<h1>LIMO</h1>

<h3>LiftPls Mobility Pvt. Ltd.</h3>

<h2>Create Your Account</h2>

<p>
Join India's smart mobility platform.
Book rides, earn rewards, and enjoy safe,
affordable transportation with LIMO.
</p>

</div>

<div class="right">

<h2>Sign Up</h2>

<form>

<div class="row">

<div class="input-box">
<i class="fa-solid fa-user"></i>
<input type="text" placeholder="First Name" required>
</div>

<div class="input-box">
<i class="fa-solid fa-user"></i>
<input type="text" placeholder="Last Name" required>
</div>

</div>

<div class="input-box">
<i class="fa-solid fa-envelope"></i>
<input type="email" placeholder="Email Address" required>
</div>

<div class="input-box">
<i class="fa-solid fa-phone"></i>
<input type="tel" placeholder="Phone Number" required>
</div>

<div class="input-box">
<i class="fa-solid fa-location-dot"></i>
<input type="text" placeholder="City" required>
</div>

<div class="input-box">
<i class="fa-solid fa-user-group"></i>

<select required>

<option value="">Select User Type</option>

<option>Rider</option>

<option>Captain</option>

</select>

</div>

<div class="row">

<div class="input-box">
<i class="fa-solid fa-lock"></i>
<input type="password" placeholder="Password" required>
</div>

<div class="input-box">
<i class="fa-solid fa-lock"></i>
<input type="password" placeholder="Confirm Password" required>
</div>

</div>

<div class="checkbox">

<label>

<input type="checkbox" required>

I agree to the Terms & Conditions

</label>

</div>

<button type="submit">
Create Account
</button>

<div class="login">

Already have an account?

<a href="login.html">Login</a>

</div>

</form>

</div>

</div>

</body>
</html>
