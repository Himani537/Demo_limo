<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIMO | Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#009688,#00b894);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:1000px;
    max-width:100%;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    box-shadow:0 20px 40px rgba(0,0,0,.2);
}

.left{
    width:45%;
    background:linear-gradient(135deg,#009688,#00695c);
    color:#fff;
    padding:60px 40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.logo{
    font-size:45px;
    font-weight:700;
    margin-bottom:10px;
}

.company{
    opacity:.9;
    margin-bottom:50px;
}

.left h2{
    font-size:32px;
    margin-bottom:15px;
}

.left p{
    line-height:1.8;
    font-size:15px;
}

.right{
    width:55%;
    padding:50px;
}

.right h2{
    text-align:center;
    color:#333;
    margin-bottom:30px;
}

.input-box{
    position:relative;
    margin-bottom:20px;
}

.input-box i{
    position:absolute;
    top:17px;
    left:15px;
    color:#009688;
}

.input-box input{
    width:100%;
    padding:15px 15px 15px 45px;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
    font-size:15px;
    transition:.3s;
}

.input-box input:focus{
    border-color:#009688;
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    font-size:14px;
}

.options label{
    display:flex;
    align-items:center;
    gap:6px;
}

.options a{
    text-decoration:none;
    color:#009688;
}

.login-btn{
    width:100%;
    padding:15px;
    background:#009688;
    color:#fff;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:17px;
    transition:.3s;
}

.login-btn:hover{
    background:#00796b;
}

.or{
    text-align:center;
    margin:25px 0;
    color:#999;
    position:relative;
}

.or::before,
.or::after{
    content:"";
    position:absolute;
    width:40%;
    height:1px;
    background:#ddd;
    top:50%;
}

.or::before{
    left:0;
}

.or::after{
    right:0;
}

.signup{
    text-align:center;
}

.signup a{
    color:#009688;
    text-decoration:none;
    font-weight:600;
}

.social{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:20px;
}

.social a{
    width:45px;
    height:45px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f3f3f3;
    color:#009688;
    text-decoration:none;
    transition:.3s;
}

.social a:hover{
    background:#009688;
    color:#fff;
}

@media(max-width:850px){

.container{
    flex-direction:column;
}

.left,
.right{
    width:100%;
}

.left{
    text-align:center;
    padding:40px 25px;
}

.right{
    padding:35px 25px;
}

.options{
    flex-direction:column;
    gap:12px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="left">

<div class="logo">
LIMO
</div>

<div class="company">
LiftPls Mobility Pvt. Ltd.
</div>

<h2>Welcome Back!</h2>

<p>
Sign in to book rides, manage your wallet,
track your trips, and enjoy exclusive offers with LIMO.
</p>

</div>

<div class="right">

<h2>Login</h2>

<form>

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
placeholder="Email Address"
required>

</div>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
placeholder="Password"
required>

</div>

<div class="options">

<label>

<input type="checkbox">

Remember Me

</label>

<a href="#">
Forgot Password?
</a>

</div>

<button class="login-btn">
Login
</button>

<div class="or">
OR
</div>

<div class="signup">

Don't have an account?

<a href="signup.html">
Create Account
</a>

</div>

<div class="social">

<a href="#"><i class="fab fa-google"></i></a>

<a href="#"><i class="fab fa-facebook-f"></i></a>

<a href="#"><i class="fab fa-linkedin-in"></i></a>

</div>

</form>

</div>

</div>

</body>
</html>
