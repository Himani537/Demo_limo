<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIMO Support</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f7fa;
}

header{
    background:#0d6efd;
    color:white;
    padding:20px;
    text-align:center;
    font-size:30px;
    font-weight:bold;
}

.container{
    width:90%;
    max-width:900px;
    margin:40px auto;
}

.support-card{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.support-card h2{
    text-align:center;
    color:#0d6efd;
    margin-bottom:10px;
}

.support-card p{
    text-align:center;
    color:#555;
    margin-bottom:30px;
}

.info{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.box{
    background:#f8f9fa;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

.box h3{
    color:#0d6efd;
    margin-bottom:10px;
}

.box p{
    margin:5px 0;
    color:#444;
}

form{
    display:flex;
    flex-direction:column;
}

input,textarea{
    margin-bottom:15px;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

textarea{
    resize:none;
    height:120px;
}

button{
    background:#0d6efd;
    color:white;
    border:none;
    padding:14px;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#0b5ed7;
}

footer{
    margin-top:40px;
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
}

@media(max-width:600px){
    header{
        font-size:24px;
    }
}
</style>
</head>

<body>

<header>
    LIMO Support Center
</header>

<div class="container">

<div class="support-card">

<h2>We're Here to Help!</h2>

<p>Need assistance with your ride, payment, or account? Contact our support team anytime.</p>

<div class="info">

<div class="box">
<h3>📞 Phone</h3>
<p>+91 98765 43210</p>
</div>

<div class="box">
<h3>📧 Email</h3>
<p>Admin@liftplsmobility.in</p>
</div>

<div class="box">
<h3>🕒 Support Hours</h3>
<p>24 × 7 Customer Support</p>
</div>

</div>

<form>

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Email Address" required>

<input type="text" placeholder="Ride ID (Optional)">

<textarea placeholder="Describe your issue..." required></textarea>

<button type="submit">
Submit Request
</button>

</form>

</div>

</div>

<footer>
© 2026 LIMO | Ride Smarter • Faster • Safer
</footer>

</body>
</html>
